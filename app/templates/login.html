<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Pay</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="/static/css/tokens.css" rel="stylesheet">
    <link href="/static/css/components.css" rel="stylesheet">
    <style>
        .auth-page { min-height: 100vh; display: flex; flex-direction: column; }
        .auth-nav { padding: var(--space-4) var(--space-5); display: flex; align-items: center; justify-content: space-between; }
        .auth-nav .brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); color: var(--ink); text-decoration: none; }
        .auth-nav .brand svg { color: var(--signal); }
        .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--space-6) var(--space-4); }
        .auth-card { width: 100%; max-width: 400px; padding: var(--space-6); }
        .auth-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--signal-tint); color: var(--signal); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto var(--space-4); }
        .auth-card h1 { text-align: center; font-size: var(--text-xl); margin-bottom: var(--space-1); }
        .auth-card .subtitle { text-align: center; color: var(--slate); margin-bottom: var(--space-5); }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap i.leading { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--slate); }
        .input-icon-wrap .input { padding-left: 36px; }
        .input-icon-wrap button.reveal { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--slate); cursor: pointer; padding: 4px; }
        .auth-footnote { text-align: center; font-size: var(--text-xs); color: var(--slate); margin-top: var(--space-4); }
        .auth-below { text-align: center; color: var(--ink-soft); margin-top: var(--space-5); }
    </style>
</head>
<body>
    <div class="auth-page">
        <nav class="auth-nav">
            <a href="/" class="brand">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="2" y="2" width="20" height="20" rx="5" fill="currentColor"/>
                    <path d="M7 9.5H17M7 13H13.5M7 16.5H10.5" stroke="var(--surface)" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                Smart Pay
            </a>
            <a href="/register" class="btn btn-secondary btn-sm">Register</a>
        </nav>

        <div class="auth-wrap">
            <div class="card auth-card">
                <div class="auth-icon"><i class="ri-login-box-line" aria-hidden="true"></i></div>
                <h1>Welcome back</h1>
                <p class="subtitle">Sign in to manage your invoices</p>

                {% if message %}
                <div class="alert alert-success" style="margin-bottom: var(--space-5);">
                    <i class="ri-check-line alert-icon" aria-hidden="true"></i>
                    <span>{{ message }}</span>
                </div>
                {% endif %}

                {% if error %}
                <div class="alert alert-error" style="margin-bottom: var(--space-5);">
                    <i class="ri-error-warning-line alert-icon" aria-hidden="true"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="post" action="/login" style="display: flex; flex-direction: column; gap: var(--space-4);">
                    <div class="field">
                        <label for="email">Email address</label>
                        <div class="input-icon-wrap">
                            <i class="ri-mail-line leading" aria-hidden="true"></i>
                            <input type="email" id="email" name="email" required placeholder="you@company.com" class="input">
                        </div>
                    </div>

                    <div class="field">
                        <label for="loginPw">Password</label>
                        <div class="input-icon-wrap">
                            <i class="ri-lock-line leading" aria-hidden="true"></i>
                            <input type="password" name="password" required placeholder="Enter your password" class="input" id="loginPw" style="padding-right: 36px;">
                            <button type="button" class="reveal" aria-label="Show password" onclick="var i=document.getElementById('loginPw');var showing=i.type==='text';i.type=showing?'password':'text';this.setAttribute('aria-label', showing?'Show password':'Hide password');this.querySelector('i').className=showing?'ri-eye-line':'ri-eye-off-line';">
                                <i class="ri-eye-line" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="ri-login-box-line" aria-hidden="true"></i> Sign in
                    </button>
                </form>

                <p class="auth-footnote"><i class="ri-shield-check-line" aria-hidden="true"></i> Account locks after 5 failed attempts for security</p>

                <hr class="divider">

                <p class="auth-below">Don't have an account? <a href="/register" style="font-weight: 600;">Create one</a></p>
            </div>
        </div>
    </div>
</body>
</html>
