<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.23/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-600 text-white shadow">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 text-xl font-bold">
                <i class="ri-file-text-line"></i> Smart Pay
            </a>
            <div class="flex gap-2">
                <a href="/dashboard" class="btn btn-sm btn-outline border-white text-white hover:bg-white hover:text-blue-600">
                    <i class="ri-home-line"></i> Home
                </a>
                <a href="/register" class="btn btn-sm bg-white text-blue-600 hover:bg-blue-50">Register</a>
            </div>
        </div>
    </nav>

    <div class="min-h-[calc(100vh-60px)] flex items-center justify-center px-4 py-12">
        <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ri-login-box-line text-3xl text-blue-600"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
                <p class="text-gray-500 mt-2">Sign in to manage your invoices</p>
            </div>

            {% if message %}
            <div class="alert alert-success mb-6">
                <i class="ri-check-line"></i>
                <span>{{ message }}</span>
            </div>
            {% endif %}

            {% if error %}
            <div class="alert alert-error mb-6">
                <i class="ri-error-warning-line"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/login" class="space-y-5">
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Email Address</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="ri-mail-line"></i></span>
                        <input type="email" name="email" required placeholder="you@company.com" class="input input-bordered w-full pl-10">
                    </div>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Password</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i class="ri-lock-line"></i></span>
                        <input type="password" name="password" required placeholder="Enter your password" class="input input-bordered w-full pl-10 pr-10" id="loginPw">
                        <button type="button" onclick="var i=document.getElementById('loginPw');i.type=i.type==='password'?'text':'password'" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="ri-eye-line"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full gap-2">
                    <i class="ri-login-box-line"></i> Sign In
                </button>
            </form>

            <!-- Security notice -->
            <div class="mt-4 text-center">
                <p class="text-xs text-gray-400">
                    <i class="ri-shield-check-line"></i>
                    Account locks after 5 failed attempts for security
                </p>
            </div>

            <div class="divider my-6">OR</div>

            <p class="text-center text-gray-600">
                Don't have an account? 
                <a href="/register" class="text-blue-600 font-medium hover:underline">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
