<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_code | default(500) }} - Smart Pay</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.23/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <div class="mb-8">
            {% if error_code == 404 %}
            <i class="ri-file-search-line text-8xl text-gray-300"></i>
            {% else %}
            <i class="ri-error-warning-line text-8xl text-red-300"></i>
            {% endif %}
        </div>
        
        <h1 class="text-6xl font-bold text-gray-900 mb-4">{{ error_code | default(500) }}</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">{{ message | default("Something went wrong") }}</h2>
        <p class="text-gray-500 mb-8 max-w-md mx-auto">
            {{ description | default("An unexpected error occurred. Please try again later.") }}
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/dashboard" class="btn btn-primary gap-2">
                <i class="ri-home-line"></i> Go to Dashboard
            </a>
            <button onclick="history.back()" class="btn btn-outline gap-2">
                <i class="ri-arrow-left-line"></i> Go Back
            </button>
        </div>
        
        <div class="mt-12">
            <a href="/dashboard" class="text-2xl font-bold text-gray-400 hover:text-blue-600 transition">
                <i class="ri-file-text-line"></i> Smart Pay
            </a>
        </div>
    </div>
</body>
</html>
