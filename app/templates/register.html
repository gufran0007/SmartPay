<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Pay</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link href="/static/css/tokens.css" rel="stylesheet">
    <link href="/static/css/components.css" rel="stylesheet">
    <style>
        .auth-page { min-height: 100vh; display: flex; flex-direction: column; }
        .auth-nav { padding: var(--space-4) var(--space-5); display: flex; align-items: center; justify-content: space-between; }
        .auth-nav .brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 700; font-size: var(--text-lg); color: var(--ink); text-decoration: none; }
        .auth-nav .brand svg { color: var(--signal); }
        .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--space-6) var(--space-4); }
        .auth-card { width: 100%; max-width: 420px; padding: var(--space-6); }
        .auth-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--success-tint); color: var(--success); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto var(--space-4); }
        .auth-card h1 { text-align: center; font-size: var(--text-xl); margin-bottom: var(--space-1); }
        .auth-card .subtitle { text-align: center; color: var(--slate); margin-bottom: var(--space-5); }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap i.leading { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--slate); }
        .input-icon-wrap .input { padding-left: 36px; }
        .input-icon-wrap button.reveal { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--slate); cursor: pointer; padding: 4px; }
        .strength-bars { display: flex; gap: 4px; margin-top: var(--space-2); }
        .strength-bars .bar { height: 4px; flex: 1; border-radius: 3px; background: var(--border); }
        .strength-text { font-size: var(--text-xs); color: var(--slate); margin-top: 4px; }
        .req-list { background: var(--surface-2); border-radius: var(--radius-md); padding: var(--space-3); font-size: var(--text-sm); display: flex; flex-direction: column; gap: 6px; }
        .req-list .req { display: flex; align-items: center; gap: 8px; color: var(--slate); }
        .req-list .req i { color: var(--border-strong); }
        .req-list .req.met { color: var(--ink); }
        .req-list .req.met i { color: var(--success); }
        .auth-below { text-align: center; color: var(--ink-soft); margin-top: var(--space-5); }
    </style>
</head>
<body>
    <div class="auth-page">
        <nav class="auth-nav">
            <a href="/" class="brand">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="2" y="2" width="20" height="20" rx="5" fill="currentColor"/>
                    <path d="M7 9.5H17M7 13H13.5M7 16.5H10.5" stroke="var(--surface)" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                Smart Pay
            </a>
            <a href="/login" class="btn btn-secondary btn-sm">Login</a>
        </nav>

        <div class="auth-wrap">
            <div class="card auth-card">
                <div class="auth-icon"><i class="ri-user-add-line" aria-hidden="true"></i></div>
                <h1>Create account</h1>
                <p class="subtitle">Get started with Smart Pay</p>

                {% if error %}
                <div class="alert alert-error" style="margin-bottom: var(--space-5);">
                    <i class="ri-error-warning-line alert-icon" aria-hidden="true"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="post" action="/register" id="registerForm" style="display: flex; flex-direction: column; gap: var(--space-4);">
                    <div class="field">
                        <label for="business_name">Business / company name</label>
                        <div class="input-icon-wrap">
                            <i class="ri-building-line leading" aria-hidden="true"></i>
                            <input type="text" id="business_name" name="business_name" required minlength="2" maxlength="100" placeholder="Your company name" value="{{ business_name|default('') }}" class="input">
                        </div>
                    </div>

                    <div class="field">
                        <label for="email">Email address</label>
                        <div class="input-icon-wrap">
                            <i class="ri-mail-line leading" aria-hidden="true"></i>
                            <input type="email" id="email" name="email" required placeholder="you@company.com" value="{{ email|default('') }}" class="input">
                        </div>
                    </div>

                    <div class="field">
                        <label for="passwordInput">Password</label>
                        <div class="input-icon-wrap">
                            <i class="ri-lock-line leading" aria-hidden="true"></i>
                            <input type="password" name="password" required minlength="8" id="passwordInput" placeholder="Create a strong password" class="input" style="padding-right: 36px;">
                            <button type="button" class="reveal" aria-label="Show password" onclick="togglePassword(this)">
                                <i class="ri-eye-line" id="eyeIcon" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="strength-bars">
                            <div class="bar" id="str1"></div>
                            <div class="bar" id="str2"></div>
                            <div class="bar" id="str3"></div>
                            <div class="bar" id="str4"></div>
                        </div>
                        <p class="strength-text" id="strengthText">Min 8 chars, uppercase, lowercase, and number</p>
                    </div>

                    <div class="req-list">
                        <div class="req" id="req-length"><i class="ri-close-circle-line" id="ico-length" aria-hidden="true"></i><span>At least 8 characters</span></div>
                        <div class="req" id="req-upper"><i class="ri-close-circle-line" id="ico-upper" aria-hidden="true"></i><span>One uppercase letter</span></div>
                        <div class="req" id="req-lower"><i class="ri-close-circle-line" id="ico-lower" aria-hidden="true"></i><span>One lowercase letter</span></div>
                        <div class="req" id="req-number"><i class="ri-close-circle-line" id="ico-number" aria-hidden="true"></i><span>One number</span></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="ri-user-add-line" aria-hidden="true"></i> Create account
                    </button>
                </form>

                <hr class="divider">

                <p class="auth-below">Already have an account? <a href="/login" style="font-weight: 600;">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(btn) {
            var input = document.getElementById('passwordInput');
            var icon = document.getElementById('eyeIcon');
            var showing = input.type === 'text';
            input.type = showing ? 'password' : 'text';
            icon.className = showing ? 'ri-eye-line' : 'ri-eye-off-line';
            btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
        }

        var strengthColors = ['', '#C0392B', '#9A6B0B', '#146C5A', '#2E8B57'];
        var strengthLabels = ['', 'Weak', 'Fair', 'Good', 'Strong'];

        document.getElementById('passwordInput').addEventListener('input', function () {
            var pw = this.value;
            var hasLength = pw.length >= 8;
            var hasUpper = /[A-Z]/.test(pw);
            var hasLower = /[a-z]/.test(pw);
            var hasNumber = /[0-9]/.test(pw);
            var score = [hasLength, hasUpper, hasLower, hasNumber].filter(Boolean).length;

            function setReq(id, pass) {
                var req = document.getElementById('req-' + id);
                var ico = document.getElementById('ico-' + id);
                req.classList.toggle('met', pass);
                ico.className = pass ? 'ri-check-line' : 'ri-close-circle-line';
            }
            setReq('length', hasLength);
            setReq('upper', hasUpper);
            setReq('lower', hasLower);
            setReq('number', hasNumber);

            for (var i = 1; i <= 4; i++) {
                var bar = document.getElementById('str' + i);
                bar.style.background = i <= score ? strengthColors[score] : '';
            }
            document.getElementById('strengthText').textContent = pw.length > 0 ? strengthLabels[score] : 'Min 8 chars, uppercase, lowercase, and number';
        });
    </script>
</body>
</html>
